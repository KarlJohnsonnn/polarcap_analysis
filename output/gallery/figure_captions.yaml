# Figure captions for paper-draft gallery (output/gallery).
# One caption per figure type. Keys are either exact filenames or type prefixes;
# the notebook matches by exact name first, then by prefix (e.g. figure13_psd_alt_time_mass).

cloud_field_overview: |
  Cloud-scale context for the ALLBB seeded plume. The upper panels show the
  topography and the three analysis sites used for the seeding, ice-growth,
  and downstream-precipitation diagnostics; the lower panels show time-height
  liquid and frozen water content together with ridge-sampled liquid and ice
  source-sink tendencies. The figure defines the transition from a liquid-rich
  source region to the downstream ice-growth and precipitation regime analyzed
  in the later figures.

fig01_cloud_field_overview.png: |
  Cloud-scale context for the ALLBB seeded plume. The upper panels show the
  topography and the three analysis sites used for the seeding, ice-growth,
  and downwind-precipitation diagnostics; the lower panels show time-height
  liquid and frozen water content together with ridge-sampled liquid and ice
  source-sink tendencies. The figure defines the transition from a liquid-rich
  source region to the downwind ice-growth and precipitation regime analyzed
  in the later figures.

figure12_plume_path: |
  Ensemble-mean Lagrangian plume evolution in equivalent-diameter space
  compared with HOLIMO observations. Colors show the ensemble-mean ice number
  density per logarithmic diameter interval along the plume; symbols identify
  the three HOLIMO missions, the lower-left panel zooms the first 15 min after
  seeding, and the lower-right panel compares time-averaged size spectra. Both
  model and observations show rapid growth from newly formed small ice to an
  O(10^2 um) population, while the observational spread is largest in the
  coarse-particle tail.

