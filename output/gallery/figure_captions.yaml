# Figure captions for paper-draft gallery (output/gallery).
# One caption per figure type. Keys are either exact filenames or type prefixes;
# the notebook matches by exact name first, then by prefix (e.g. figure13_psd_alt_time_mass).

cloud_field_overview: |
  Cloud-scale context for the ALLBB seeded plume. Orography and the three
  analysis sites (seeding, ice-growth, downstream precipitation) are shown
  above; below, time-height liquid and frozen water content and ridge-sampled
  liquid/ice source-sink tendencies summarize the local microphysical regime.
  The sequence suggests a transition from a liquid-rich source region to a
  downstream ice-growth and precipitation regime that defines the plume
  evolution analysed in the later figures.

