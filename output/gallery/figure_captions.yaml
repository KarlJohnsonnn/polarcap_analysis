figure13_psd_alt_time_mass: |
  Altitude-resolved liquid and frozen PSD mass in successive post-seeding
  windows. Early windows are dominated by liquid mass at small diameters,
  whereas later windows show increasing frozen mass at larger diameters and
  progressively lower levels. This indicates that, once ice is initiated aloft,
  subsequent plume evolution is governed mainly by growth and fallout rather
  than by continued primary formation.

fig13_psd_mass.png: |
  Altitude-resolved liquid and frozen PSD mass in successive post-seeding
