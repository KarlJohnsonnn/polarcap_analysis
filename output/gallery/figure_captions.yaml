figure13_psd_alt_time_number: |
  Altitude-resolved liquid and frozen PSD number concentration in successive
  post-seeding windows. Frozen number appears first at small-to-intermediate
  diameters and comparatively high levels, then expands toward larger diameters
  and lower altitudes with time. This figure isolates where new ice crystals
  are produced, complementing the mass view that diagnoses their subsequent
  growth.

fig13_psd_number.png: |
  Altitude-resolved liquid and frozen PSD number concentration in successive
