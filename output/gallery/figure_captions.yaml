# Figure captions for paper-draft gallery (output/gallery).
# One caption per figure type. Keys are either exact filenames or type prefixes;
# the notebook matches by exact name first, then by prefix (e.g. figure13_psd_alt_time_mass).

cloud_field_overview: |
  Cloud field overview: time–height mass concentration profiles (symlog) for all
  meteogram stations (ALLBB). Droplet and ice mass from COSMO-SPECS ensemble.

fig01_cloud_field_overview.png: |
  Cloud field overview: time–height mass concentration profiles (symlog) for all
  meteogram stations (ALLBB). Droplet and ice mass from COSMO-SPECS ensemble.

figure12_plume_path: |
  Ensemble-mean Lagrangian plume path. Trajectories from selected plume realisations
  with altitude and time; used for PAMTRA forward sampling.

fig12_plume_path.png: |
  Ensemble-mean Lagrangian plume path. Trajectories from selected plume realisations
  with altitude and time; used for PAMTRA forward sampling.

figure13_psd_alt_time_mass: |
  PSD altitude–time evolution (mass). Particle size distribution mass mixing ratio
  along the plume path as a function of altitude and time.

fig13_psd_mass.png: |
  PSD altitude–time evolution (mass). Particle size distribution mass mixing ratio
  along the plume path as a function of altitude and time.

figure13_psd_alt_time_number: |
  PSD altitude–time evolution (number). Particle size distribution number concentration
  along the plume path as a function of altitude and time.

fig13_psd_number.png: |
  PSD altitude–time evolution (number). Particle size distribution number concentration
  along the plume path as a function of altitude and time.

spectral_waterfall: |
  Spectral waterfall: time evolution of the droplet size distribution at the station
  (number concentration N or mass mixing ratio Q). View D spectral budget along the ridge.

pamtra_mira35_quicklook: |
  PAMTRA vs MIRA35 quicklook: radar reflectivity and mean Doppler velocity along the
  plume path, aligned with plume-lagrangian timing for model–observation comparison.
