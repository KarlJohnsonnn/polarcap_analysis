  diameters and comparatively high levels, then expands toward larger diameters
  and lower altitudes with time. This figure isolates where new ice crystals
  are produced, complementing the mass view that diagnoses their subsequent
  growth.

spectral_waterfall: |
  Animated ridge-following spectral budget for the seeded plume. Each frame
  combines the liquid and frozen particle size distributions with
  diameter-resolved microphysical tendencies at the selected stations, either
  in number-concentration space (N) or mass-concentration space (Q). The
  animation separates the processes that first generate excess ice shortly
  after seeding from those that later grow, redistribute, and remove
  condensate across the spectrum.

pamtra_mira35_quicklook: |
  Radar-closure comparison between plume-sampled PAMTRA output and MIRA35
  observations aligned by elapsed time since seeding. In this example the
  observed echo is deeper and more intermittent, whereas the forward-modeled
  echo is smoother and more vertically confined; the Doppler comparison likewise
  tests whether the simulated plume reproduces the observed fall-speed
  structure. The figure addresses whether the Lagrangian spectral-bin plume
  captures the radar-observed timing, depth, and dynamical evolution of the
  seeded cloud.
