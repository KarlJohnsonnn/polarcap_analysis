# Default CLI args passed to each publication figure job (run_publication_figures.py).
# Keys must match FigureJob.key. Each value is a list of strings; each string is split on
# whitespace, so you can use one line per argument (e.g. "--kind N" or "--xlim-w 1e-1 4e3").
# Jobs with an arg_builder (e.g. pamtra_mira35_quicklook) get these args appended after builder output.
# Empty list or missing key: no extra args (script uses its own defaults).
#
# spectral_waterfall_N / spectral_waterfall_Q replace run_spectral_waterfall_NQall.sh; both run from
# run_publication_figures.py when you do not --skip them. Use --figures spectral_waterfall to run both.

default_args:
  analysis_registry: []
  cloud_field_overview: []
  cloud_phase_budget_table: []
  plume_lagrangian: []
  ridge_metrics: []
  psd_waterfall: []
  psd_stats: []
  growth_summary: []
  spectral_waterfall_N:
    - "--kind N"
    - "--linthresh-w 1e-2"
    - "--linthresh-f 1e-2"
    - "--xlim-w 1e-1 4e3"
    - "--xlim-f 1e-1 4e3"
    - "--ylim-w=-1e6,1e6"
    - "--ylim-f=-1e6,1e6"
    - "--psd-ylim-w 1e1 1e9"
    - "--psd-ylim-f 1e1 1e9"
    - "--mp4"
    - "--workers 4"
  # spectral_waterfall_Q:
  #   - "--kind Q"
  #   - "--linthresh-w 1e-8"
  #   - "--linthresh-f 1e-8"
  #   - "--xlim-w 1e-1 4e3"
  #   - "--xlim-f 1e-1 4e3"
  #   - "--ylim-w=-1e-2,1e-2"
  #   - "--ylim-f=-1e-2,1e-2"
  #   - "--psd-ylim-w 1e-6 1e0"
  #   - "--psd-ylim-f 1e-6 1e0"
  #   - "--mp4"
  #   - "--workers 4"
  first_ice_metrics: []
  initiation_process_summary: []
  pamtra_mira35_quicklook: []
