  spectral_waterfall:
    # Shared defaults for both kinds. Add `spectral_waterfall_Q:` and/or `spectral_waterfall_N:`
    # sibling blocks when one unit family needs different limits or styling.

    # What the figure emphasizes.
    kind: "Q"  # Default unit family: "Q" highlights mass evolution, "N" highlights number evolution.
    plot_style: steps  # `steps` preserves bin structure; `bars` feels categorical; `lines` reads more smoothly.
    yscale: symlog  # `symlog` keeps near-zero structure visible without losing strong positive/negative bursts.
    normalize_mode: "none"  # `none` = physical units, `bin` = per-bin shares, `panel` = shape-only comparison.
    show_psd_twin: true  # Adds a PSD context strip above each station column.
    show_proc_labels: "legend"   # `legend` stays compact; `cmap` writes process-color meaning into the figure itself.
    use_plume_ridge: true  # Follow the frozen-plume ridge instead of fixed layers for each time step.

    # Main signed-rate panel styling.
    line_linewidth: 0.75  # Makes step / line traces readable in print without overpowering the fills.
    fill_alpha: 0.66  # Controls how strongly stacked positive / negative areas dominate the panel.
    line_alpha: 0.66  # Controls how strongly the outline competes with the fills.
    rate_white_linewidth: 2.0  # White halo keeps traces legible against dense fills and grids.
    rate_color_linewidth: 0.36  # Primary colored trace width.
    rate_black_linewidth: 0.15  # Thin top edge sharpens the trace without making it heavy.

    # PSD strip styling.
    psd_color_W: "royalblue"  # Liquid PSD color identity.
    psd_color_F: "darkorange"  # Ice PSD color identity.
    psd_fill_alpha: 0.66  # Higher values make PSD area shape more prominent.
    psd_white_linewidth: 2.0  # Halo keeps PSD outlines clear against their fill.
    psd_color_linewidth: 0.66  # Main PSD outline width.
    psd_black_linewidth: 0.15  # Fine edge for a crisp PSD silhouette.
    psd_yscale: "log"  # `log` reveals onset and mature PSDs in the same strip.

    # Bar styling (used only with `plot_style: bars`).
    bar_edge_color: "black"  # Edge color that keeps neighboring bars visually separated.
    bar_edge_linewidth: 0.36  # Edge weight for bar-style rendering.
    bar_width_frac_merged: 0.95  # Wider bars read as continuous spectra; smaller values separate bins more clearly.
    pos_alpha: 0.75  # Visibility of positive stacked-process areas.
    neg_alpha: 0.75  # Visibility of negative stacked-process areas.

    # Ridge growth overlay (z_mean, Σ, ⟨D⟩, d⟨D⟩/dt).
    ridge_mass_floor: 0.0  # Raise this to ignore extremely weak ice when locating the ridge itself.
    growth_ice_sum_floor_q: 1.0e-6  # Hide ice Σ / ⟨D⟩ when ridge-integrated ice mass is too small to trust.
    growth_ice_sum_floor_n: 1.0  # Same safeguard for number-based runs.
    growth_ice_mask_until_min: null  # Limit that safeguard to early times, or leave null to apply it whenever ice stays tiny.
    show_growth_textbox: true  # Adds a compact per-frame growth summary inside the main panel.
    growth_rate_window_frames: 3  # Longer windows smooth growth-rate noise; shorter windows react faster to changes.
    growth_rate_mode: regression  # `regression` is steadier; `last_interval` responds immediately to the latest step.
    write_growth_csv: true  # Exports the plotted ridge-growth series for reuse outside the figure.
    show_growth_footer: true  # Adds the 4-row footer strip for time context below the main panels.
    show_growth_sparkline: false  # Legacy alias; still turns the footer on if needed.
    growth_footer_linewidth: 0.9  # Footer trace weight and current-time cursor weight.

    # Shared layout + minimal-scientific styling.
    panel_height_ratios: [1.35, 2.15, 2.15]  # Relative emphasis: PSD context, liquid rates, ice rates.
    main_stack_hspace: 0.018  # Smaller values tighten PSD / liquid / ice into one visual block.
    main_col_wspace: 0.035  # Smaller values make station columns feel more comparable.
    footer_block_hspace: 0.12  # More space makes the four footer rows easier to read independently.
    footer_outer_height_ratio: 0.6  # Higher values give the footer more visual weight.
    axis_tick_label_pt: 6.8  # Tick-label size for dense multi-panel reading.
    station_title_pt: 8.0  # Station-title size above each column.
    axis_spine_linewidth: 0.55  # Thin spines keep the figure clean and technical.
    grid_linewidth: 0.18  # Light grid that guides the eye without taking over.
    grid_alpha: 0.26  # Grid visibility.
    grid_linestyle: "-"  # Grid texture.
    grid_color: "0.84"  # Neutral grid tone.
    panel_annotation_alpha: 0.48  # How strongly annotation boxes stand out from the data.
    panel_annotation_pad: 0.10  # Annotation breathing room.
    panel_bbox_alpha: 0.30  # Opacity of panel label boxes.
    zero_linewidth: 0.30  # Visibility of the signed-rate zero reference.
    zero_line_color: "0.60"  # Tone of the signed-rate zero reference.
    growth_cursor_color: "0.45"  # Current-time cursor tone in the footer.
    panel_group_bg: "1.0"  # Background behind grouped axes.
    legend_font_pt: 6.4  # Legend density.
    legend_frame_alpha: 0.82  # Legend box visibility.
    figure_title_pt: 9.0  # Overall title emphasis.
    figure_label_pt: 8.0  # Shared axis-label emphasis.
    # Optional figure margins in normalized figure coordinates.
    # figure_margin_left: 0.085  # More room for the shared y label.
    # figure_margin_right: 0.98  # More outer whitespace on the right when no colorbar is shown.
    # figure_margin_right_cmap: 0.82  # Reserve room for a right-side colorbar.
    # figure_margin_top: 0.88  # More space between title and panel block.
    # figure_margin_bottom: 0.12  # Bottom whitespace without footer.
    # figure_margin_bottom_footer: 0.17  # Bottom whitespace when the footer is enabled.

  render:
    workers: 5  # More workers shorten full renders; use 1 when you want easier debugging / profiling.
    frame_dpi: 300  # Controls PNG sharpness in gallery and print use.
    frame_png_compress: 1  # Lower values write faster; higher values save disk space.
    # Playback speed only: higher FPS shortens the MP4 without changing the number of PNG frames.
    mp4_fps: 5

