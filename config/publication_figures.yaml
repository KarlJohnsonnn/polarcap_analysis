# Publication runner presets (`config/publication_figures.yaml` → run_publication_figures.py).
#
# Use this file to keep promoted figures visually consistent without repeating
# long CLI commands. Each job key below maps to one analysis driver.
#
# How to edit safely:
# - one YAML list item = one logical CLI argument
# - bare flags are fine: `"--mp4"`
# - options with values can stay on one line: `"--xlim-w 1e-3 4e3"`
# - for negative ranges, prefer `=` / comma form so the minus sign stays attached
# - an empty list means "use that script's own defaults"
#
# Runner note:
# - `--figures spectral_waterfall` is only a CLI shortcut; in YAML keep
#   `spectral_waterfall_N` and `spectral_waterfall_Q` separate

ensemble:
  cs_runs: [cs-eriswil__20260304_110254]  # Picks the run to load and names every PNG / MP4 / CSV output folder.
  cs_run: cs-eriswil__20260304_110254
  domain: 50x42
  
paths:
  server_root: "" # "/work/bb1262/user/schimmel/cosmo-specs-torch/cosmo-specs-runs/RUN_ERISWILL_200x160x100/"
  local_meteogram_root: "/Users/schimmel/data/cosmo-specs/meteograms"  # Override where local Meteogram Zarr files are discovered.
  local_ensemble_config_root: null  # Override where local `<cs_run>.json` ensemble configs are discovered.

default_args:
  analysis_registry: []  # Refresh merged registry CSVs used by paper claims, tables, and audits.
  # Render the promoted cloud-field overview figure with script defaults.
  cloud_field_overview: 
    - "--station-ids 0 1 2 3 4"
    - "--plot-start 2023-01-25T12:29:50"
    - "--plot-end 2023-01-25T13:05:00"
    - "--extpar-low /Users/schimmel/data/cosmo-specs/meteograms/extPar_Eriswil_50x40.nc"
    - "--extpar-high /Users/schimmel/data/cosmo-specs/meteograms/extPar_Eriswil_200x160.nc"
    - "--output output/gfx/png/01/cloud_field_overview_mass__20260304_110254_ALLBB.png"
    - "--dpi 300"
  cloud_phase_budget_table: []  # Export the companion phase-budget tables that support the overview figure.
  plume_lagrangian: []  # Build the plume-lagrangian evolution figure with its default styling.
  ridge_metrics: []  # Export plume-ridge metrics and uncertainty time series.
  psd_waterfall: []  # Render the PSD waterfall figure suite in its default publication form.
  psd_stats: []  # Refresh PSD-derived summary CSVs for downstream synthesis.
  growth_summary: []  # Rebuild the joined growth-summary registry outputs.
  spectral_waterfall_N:
    # Number-concentration publication preset: broad dynamic range, onset still readable, full MP4 refresh.
    - "--kind N"  # Render the number version of the waterfall.
    - "--linthresh-w 1e-2"  # Keep weak liquid-rate structure visible near zero.
    - "--linthresh-f 1e-2"  # Keep weak ice-rate structure visible near zero.
    - "--xlim-w 1e-3 4e3"  # Show the full liquid-diameter range used in the paper.
    - "--xlim-f 1e-3 4e3"  # Show the full ice-diameter range used in the paper.
    - "--ylim-w=-1e6,1e6"  # Avoid clipping the strongest liquid process pulses.
    - "--ylim-f=-1e6,1e6"  # Avoid clipping the strongest ice process pulses.
    - "--psd-ylim-w 1e1 1e9"  # Keep liquid PSD visible from first signal to peak.
    - "--psd-ylim-f 1e1 1e9"  # Keep ice PSD visible from trace signal to peak.
    - "--mp4"  # Rebuild frames and MP4 so gallery outputs match the latest style.
  spectral_waterfall_Q:
    # Mass-concentration publication preset: tighter near-zero contrast for weak early ice signatures.
    - "--kind Q"  # Render the mass version of the waterfall.
    - "--linthresh-w 1e-10"  # Preserve subtle liquid mass tendencies around zero.
    - "--linthresh-f 1e-10"  # Preserve subtle ice mass tendencies around zero.
    - "--xlim-w 1e-3 4e3"  # Show the full liquid-diameter range used in the paper.
    - "--xlim-f 1e-3 4e3"  # Show the full ice-diameter range used in the paper.
    - "--ylim-w=-1e-2,1e-2"  # Keep liquid mass-rate extremes in frame without flattening onset.
    - "--ylim-f=-1e-2,1e-2"  # Keep ice mass-rate extremes in frame without flattening onset.
    - "--psd-ylim-w 1e-6 1e0"  # Keep liquid mass PSD readable from trace mass to peak.
    - "--psd-ylim-f 1e-6 1e0"  # Keep ice mass PSD readable from trace mass to peak.
    - "--mp4"  # Rebuild frames and MP4 so publication media stays in sync.
  first_ice_metrics: []  # Refresh first excess-ice onset metrics for initiation analysis.
  initiation_process_summary: []  # Refresh early-window initiation fractions by dominant process.
  pamtra_mira35_quicklook: []  # Optional extra flags after the required PAMTRA input arguments.
